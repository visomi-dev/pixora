{{ define "main" }}
<section class="list">
  <header class="list-header">
    <h1>{{ .Title }}</h1>
    {{ with.Description }}
    <p class="description">{{ . }}</p>
    {{ end }}
  </header>
  <ul class="list-items">
    {{
      range.Pages
    }}
    <li>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      {{ with.Description }}
      <p>{{ . }}</p>
      {{ end }}
    </li>
    {{
      end
    }}
  </ul>
</section>
{{ end }}
