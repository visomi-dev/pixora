{{ define "main" }}
<article class="page">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with.Description }}
    <p class="description">{{ . }}</p>
    {{ end }}
  </header>
  <div class="page-content">
    {{ .Content }}
  </div>
  <footer class="page-footer">
    {{ with.PrevInSection }}
    <a href="{{ .Permalink }}" class="prev">&larr; {{ .Title }}</a>
    {{ end }}
    {{ with.NextInSection }}
    <a href="{{ .Permalink }}" class="next">{{ .Title }} &rarr;</a>
    {{ end }}
  </footer>
</article>
{{ end }}
