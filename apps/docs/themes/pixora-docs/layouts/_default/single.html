{{ define "main" }}
<article class="page">
  <header class="mb-12">
    <h1 class="mb-4 text-5xl font-black tracking-tight text-slate-900 dark:text-white">{{ .Title }}</h1>
    {{ with.Description }}
    <p class="text-xl leading-relaxed font-light text-slate-600 dark:text-slate-400">{{ . }}</p>
    {{ end }}
  </header>
  <div class="prose prose-slate dark:prose-invert max-w-none">{{ .Content }}</div>
  <footer
    class="mt-24 flex items-center justify-between border-t border-slate-200 pt-8 text-xs text-slate-500 dark:border-slate-800"
  >
    <p>&copy; 2026 Pixora Framework Team. Built for the next generation of real-time graphics.</p>
    <div class="flex gap-6">
      <a class="hover:text-primary" href="#">Twitter</a>
      <a class="hover:text-primary" href="#">GitHub</a>
      <a class="hover:text-primary" href="#">Legal</a>
    </div>
  </footer>
</article>
{{ end }}
