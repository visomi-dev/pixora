name: Publish to npm

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build pixora
        run: pnpm nx build pixora

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./dist/libs/pixora/package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to npm
        run: |
          echo "Publishing @pixora/pixora@${{ steps.version.outputs.VERSION }} to npm..."
          cd dist/libs/pixora
          npm publish --access public --provenance
